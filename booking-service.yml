server:
  port: 5009

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/airline_booking_service
    username: root
    password: Rishi@18

  # कडक बदल: इथे कंझ्युमर ऐवजी प्रोड्युसरचे अचूक सेटिंग्ज टाकले आहेत
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true